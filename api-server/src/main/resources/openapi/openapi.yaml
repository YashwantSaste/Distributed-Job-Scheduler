openapi: 3.0.3
info:
  title: Distributed Job Scheduler API
  description: |
    REST API for creating, managing, and monitoring scheduled jobs.

    **Schedule types**
    - `ONE_TIME` — runs once at `nextExecutionTime`
    - `CRON` — recurring schedule using a 5-field UTC cron expression (`minute hour day month day-of-week`)
    - `FIXED_DELAY` — recurring with delay measured from job completion (interval in `cronExpression`, e.g. `PT30S` or `30`)
    - `FIXED_RATE` — recurring at a fixed interval (same `cronExpression` format as FIXED_DELAY)

    For `CRON`, `FIXED_DELAY`, and `FIXED_RATE` jobs, `nextExecutionTime` is computed automatically when omitted.
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local API server
tags:
  - name: health
    description: Service health
  - name: jobs
    description: Job lifecycle management
paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: API server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /jobs:
    get:
      tags: [jobs]
      summary: List jobs
      operationId: listJobs
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Paginated job list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobResponse'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
    post:
      tags: [jobs]
      summary: Create a job
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobCommand'
            examples:
              cronJob:
                summary: Cron job every 5 minutes
                value:
                  name: sync-inventory
                  description: Sync inventory from warehouse
                  payload: '{"type":"http","url":"https://example.com/sync","method":"POST"}'
                  scheduleType: CRON
                  cronExpression: '*/5 * * * *'
                  priority: 5
                  maxRetries: 3
              oneTimeJob:
                summary: One-time job
                value:
                  name: send-report
                  payload: '{"type":"email","to":"ops@example.com","subject":"Daily report"}'
                  scheduleType: ONE_TIME
                  nextExecutionTime: '2026-06-29T09:00:00Z'
                  priority: 1
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
  /jobs/{id}:
    parameters:
      - $ref: '#/components/parameters/jobId'
    get:
      tags: [jobs]
      summary: Get job by ID
      operationId: getJob
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
    put:
      tags: [jobs]
      summary: Update a job
      operationId: updateJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJobCommand'
      responses:
        '200':
          description: Job updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
    delete:
      tags: [jobs]
      summary: Delete a job
      operationId: deleteJob
      responses:
        '200':
          description: Job deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
  /jobs/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/jobId'
    post:
      tags: [jobs]
      summary: Cancel a job
      operationId: cancelJob
      responses:
        '200':
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
  /jobs/{id}/pause:
    parameters:
      - $ref: '#/components/parameters/jobId'
    post:
      tags: [jobs]
      summary: Pause a job
      operationId: pauseJob
      responses:
        '200':
          description: Job paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
  /jobs/{id}/resume:
    parameters:
      - $ref: '#/components/parameters/jobId'
    post:
      tags: [jobs]
      summary: Resume a paused job
      operationId: resumeJob
      responses:
        '200':
          description: Job resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
  /jobs/{id}/history:
    parameters:
      - $ref: '#/components/parameters/jobId'
    get:
      tags: [jobs]
      summary: Get execution history for a job
      operationId: getJobHistory
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Execution history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExecutionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
  /jobs/{id}/retry:
    parameters:
      - $ref: '#/components/parameters/jobId'
    post:
      tags: [jobs]
      summary: Retry a failed job
      operationId: retryJob
      responses:
        '202':
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
  /jobs/{id}/trigger:
    parameters:
      - $ref: '#/components/parameters/jobId'
    post:
      tags: [jobs]
      summary: Manually trigger a job run
      operationId: triggerJob
      responses:
        '202':
          description: Trigger accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/DatabaseUnavailable'
components:
  parameters:
    jobId:
      name: id
      in: path
      required: true
      description: Job UUID
      schema:
        type: string
        format: uuid
    limit:
      name: limit
      in: query
      description: Maximum number of results (1–200)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    offset:
      name: offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    ValidationFailed:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    DatabaseUnavailable:
      description: Database operation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
  schemas:
    ApiResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: ok
        message:
          type: string
          example: api-server is healthy
    ErrorResponse:
      type: object
      required: [code, errors]
      properties:
        code:
          type: string
          example: validation_failed
        errors:
          type: array
          items:
            type: string
          example:
            - name is required
            - cronExpression is required for CRON jobs
    ScheduleType:
      type: string
      enum: [ONE_TIME, CRON, FIXED_DELAY, FIXED_RATE]
    JobStatus:
      type: string
      enum: [CREATED, SCHEDULED, RUNNING, PAUSED, CANCELLED, COMPLETED, FAILED, DEAD]
    ExecutionStatus:
      type: string
      enum: [QUEUED, RUNNING, CANCELLED, SUCCEEDED, FAILED, DEAD_LETTERED]
    CreateJobCommand:
      type: object
      required: [name, scheduleType, priority]
      properties:
        name:
          type: string
          maxLength: 255
          example: nightly-backup
        description:
          type: string
          example: Back up database to S3
        payload:
          type: string
          description: JSON string describing executor configuration
          example: '{"type":"shell","command":"pg_dump scheduler"}'
        scheduleType:
          $ref: '#/components/schemas/ScheduleType'
        cronExpression:
          type: string
          description: |
            For CRON: 5-field UTC expression (`minute hour day month day-of-week`).
            For FIXED_DELAY/FIXED_RATE: interval as ISO-8601 duration (`PT30S`) or seconds (`30`).
          example: '0 9 * * 1-5'
        priority:
          type: integer
          description: Higher values run first
          example: 5
        maxRetries:
          type: integer
          minimum: 0
          default: 3
        nextExecutionTime:
          type: string
          format: date-time
          description: Required for ONE_TIME; optional for recurring schedules (auto-computed when omitted)
    UpdateJobCommand:
      type: object
      required: [name, scheduleType]
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        payload:
          type: string
        scheduleType:
          $ref: '#/components/schemas/ScheduleType'
        cronExpression:
          type: string
        priority:
          type: integer
        maxRetries:
          type: integer
          minimum: 0
        nextExecutionTime:
          type: string
          format: date-time
    JobResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        payload:
          type: string
        scheduleType:
          $ref: '#/components/schemas/ScheduleType'
        cronExpression:
          type: string
          nullable: true
        priority:
          type: integer
        status:
          $ref: '#/components/schemas/JobStatus'
        retryCount:
          type: integer
        maxRetries:
          type: integer
        nextExecutionTime:
          type: string
          format: date-time
          nullable: true
        lastExecutionTime:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ExecutionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ExecutionStatus'
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        executorId:
          type: string
        errorMessage:
          type: string
          nullable: true
        retryNumber:
          type: integer
        logs:
          type: string
          nullable: true
